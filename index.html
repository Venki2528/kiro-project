<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutfitEase - Plan Your Perfect Outfit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>👗 OutfitEase</h1>
        <p class="tagline">Plan your perfect outfit in seconds</p>
    </header>

    <main>
        <section class="category-selector">
            <button class="category-btn active" data-category="casual">
                ☀️ Casual
            </button>
            <button class="category-btn" data-category="office">
                💼 Office
            </button>
            <button class="category-btn" data-category="party">
                🎉 Party
            </button>
            <button class="category-btn" data-category="favorites">
                ❤️ Favorites
            </button>
        </section>

        <section class="outfits-container" id="outfitsContainer">
            <!-- Outfit cards will be dynamically inserted here -->
        </section>
    </main>

    <footer>
        <p>Made with ❤️ for effortless style</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
